name: Docker

on:
  workflow_dispatch: # allows to be run manually
  push:
    tags:
      - '*'
  pull_request:
    branches:
      - 'main'

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    name: Build and push Docker image to Docker Hub or GHCR
    runs-on: ubuntu-latest
    env:
      push_to_docker_hub: ${{ secrets.DOCKER_USERNAME != null && secrets.DOCKER_PASSWORD != null }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Initialize submodule with tag checkout
        run: |
          cd pretalx
          git fetch --all --tags

          # Check if current build is from a tag
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
            echo "Building from tag: $TAG_NAME"
            git checkout "tags/$TAG_NAME" 2>/dev/null || git checkout HEAD
          else
            echo "Building from branch/PR, using HEAD"
            git checkout HEAD
          fi
          git log -1 --oneline

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.push_to_docker_hub == 'true' && 'pretalx/standalone' || format('ghcr.io/{0}', github.repository) }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        if: github.event_name != 'pull_request' && env.push_to_docker_hub == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GHCR
        if: github.event_name != 'pull_request' && env.push_to_docker_hub == 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
